<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constancias de Asistencia - SMEAT Cenipalma</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:24px 16px}
.container{max-width:860px;margin:0 auto}
.header{background:#1a3a6b;border-radius:12px;padding:20px 28px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
.header img{height:50px}
.header-text h1{color:#fff;font-size:18px;font-weight:700}
.header-text p{color:#b0c4e8;font-size:13px;margin-top:3px}
.search-card{background:#fff;border-radius:12px;border:1px solid #dce3ef;padding:24px 28px;margin-bottom:20px}
.search-card h2{font-size:15px;color:#1a3a6b;font-weight:700;margin-bottom:8px}
.search-card p{font-size:13px;color:#666;margin-bottom:16px}
.search-row{display:flex;gap:10px}
.search-row input{flex:1;border:1.5px solid #c5d0e0;border-radius:8px;padding:11px 16px;font-size:14px;color:#222;outline:none}
.search-row input:focus{border-color:#1a3a6b}
.btn-primary{background:#1a3a6b;color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#22499e}
.btn-orange{background:#e85d04;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-orange:hover{background:#f06820}
.estado{text-align:center;padding:32px;color:#888;font-size:14px}
.estado-error{color:#c0392b}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #ddd;border-top-color:#1a3a6b;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.results-count{font-size:13px;color:#1a3a6b;font-weight:600;background:#e8eef8;padding:8px 16px;border-radius:20px;margin-bottom:14px;display:inline-block}
.events-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.event-card{background:#fff;border:1.5px solid #dce3ef;border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .15s}
.event-card:hover{border-color:#1a3a6b;box-shadow:0 2px 8px rgba(26,58,107,.1)}
.event-card.selected{border-color:#e85d04;background:#fff8f5}
.event-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.event-name{font-size:14px;font-weight:700;color:#1a3a6b;line-height:1.4;flex:1}
.event-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.meta-pill{font-size:11px;color:#555;background:#f1f4fb;padding:3px 10px;border-radius:20px}
.meta-pill.naranja{background:#fff0e8;color:#c04a00}
.download-area{margin-top:12px;padding-top:10px;border-top:1px dashed #e0e4ec;display:none}
.event-card.selected .download-area{display:block}
.nota-legal{font-size:11px;color:#888;text-align:center;margin-top:16px;padding:10px}
@media(max-width:600px){.search-row{flex-direction:column}.header{flex-direction:column;text-align:center}}
</style>
</head>

const FIRMANTES={
'Norte':{nombre:'Gabriel Esteban Enriquez Castillo',cargo:'Responsable de Extension, Zona Norte'},
'Oriental':{nombre:'Jose Luis Quintero Rangel',cargo:'Responsable de Extension, Zona Oriental'},
'Central':{nombre:'Blanca Yasmin Penagos Ulloa',cargo:'Responsable de Extension, Zona Central'},
'Suroccidental':{nombre:'Wilson Antonio Perez Toro',cargo:'Responsable de Extension, Zona Suroccidental'}
};
let datosActuales=[];let seleccionado=-1;
function formatFecha(ts){if(!ts)return'N/A';const d=new Date(ts);const m=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return d.getDate()+' de '+m[d.getMonth()]+' de '+d.getFullYear()}
function calcDuracion(ini,fin){if(!ini||!fin)return'N/A';const h=Math.round(Math.abs(fin-ini)/(1e3*60*60));return h+' hora'+(h!==1?'s':'')}
function fechaExp(){const h=new Date();const m=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return h.getDate()+' dias del mes de '+m[h.getMonth()]+' del ano '+h.getFullYear()}
function val(v){return v||'N/A'}
function getFirmante(z){if(!z)return FIRMANTES['Norte'];for(const k in FIRMANTES){if(z.toLowerCase().includes(k.toLowerCase()))return FIRMANTES[k]};return FIRMANTES['Norte']}
async function buscar(){
const c=document.getElementById('inputCedula').value.trim();
if(!c){document.getElementById('resultado').innerHTML='<div class="estado estado-error">Por favor ingresa tu numero de cedula.</div>';return}
const div=document.getElementById('resultado');
div.innerHTML='<div class="estado"><div class="spinner"></div><br>Consultando tus eventos...</div>';
seleccionado=-1;datosActuales=[];
try{
const where=encodeURIComponent("NumeroIdentificacion='"+c+"'");
const fields='OBJECTID,NumeroIdentificacion,NombreAsistente,ApellidoAsistente,RNP,TipoParticipante,NombreEvento,CodigoEvento,FechaEvento,HoraInicio,HoraFinal,MunicipioEvento,DepartamentoEvento,ZonaEvento,DireccionEvento,Tematica,Organizador,CargoOrganizador,NombreJefe,CargoJefe,Modalidad';
const url=FEATURE_URL+'/query?where='+where+'&outFields='+fields+'&f=json';
const resp=await fetch(url);const data=await resp.json();
if(data.error)throw new Error(data.error.message);
const features=data.features||[];
if(features.length===0){div.innerHTML='<div class="estado estado-error">No se encontraron eventos con asistencia confirmada para la cedula <strong>'+c+'</strong>.<br><br>Verifica que el numero sea correcto.</div>';return}
datosActuales=features.map(f=>f.attributes);renderResultados()
}catch(e){div.innerHTML='<div class="estado estado-error">Error al consultar: '+e.message+'</div>'}
}
function seleccionar(i){seleccionado=(seleccionado===i)?-1:i;renderResultados()}
function renderResultados(){
const d=datosActuales;const nom=val(d[0].NombreAsistente)+' '+val(d[0].ApellidoAsistente);
let h='<span class="results-count">Se encontraron '+d.length+' evento(s) para: <strong>'+nom+'</strong></span>';
h+='<p style="font-size:12px;color:#666;margin-top:8px;">Selecciona un evento para descargar su constancia:</p>';
h+='<div class="events-list">';
d.forEach((ev,i)=>{
const sel=seleccionado===i;
h+='<div class="event-card'+(sel?' selected':'')+'" onclick="seleccionar('+i+')">';
h+='<div class="event-top"><div class="event-name">'+val(ev.NombreEvento)+'</div>';
if(sel)h+='<span style="color:#e85d04;font-size:18px;">&#10003;</span>';
h+='</div><div class="event-meta">';
h+='<span class="meta-pill">&#128197; '+formatFecha(ev.FechaEvento)+'</span>';
if(ev.MunicipioEvento)h+='<span class="meta-pill">&#128205; '+ev.MunicipioEvento+', '+val(ev.DepartamentoEvento)+'</span>';
if(ev.ZonaEvento)h+='<span class="meta-pill">Zona: '+ev.ZonaEvento+'</span>';
if(ev.Modalidad)h+='<span class="meta-pill naranja">'+ev.Modalidad+'</span>';
h+='<span class="meta-pill">&#9201; '+calcDuracion(ev.HoraInicio,ev.HoraFinal)+'</span>';
h+='</div><div class="download-area">';
h+='<button class="btn-orange" onclick="event.stopPropagation();generarPDF('+i+')">&#8595; Descargar constancia en PDF</button>';
h+='</div></div>';
});
h+='</div>';document.getElementById('resultado').innerHTML=h;
}
function generarPDF(idx){
const ev=datosActuales[idx];const{jsPDF}=window.jspdf;
const doc=new jsPDF({unit:'mm',format:'letter'});
const w=doc.internal.pageSize.getWidth();const ht=doc.internal.pageSize.getHeight();
const mL=25,mR=25;const cW=w-mL-mR;
const nom=val(ev.NombreAsistente)+' '+val(ev.ApellidoAsistente);
const ced=val(ev.NumeroIdentificacion);const dur=calcDuracion(ev.HoraInicio,ev.HoraFinal);
const firm=getFirmante(ev.ZonaEvento);
try{doc.addImage('data:image/png;base64,'+LOGO1_B64,'PNG',mL,12,60,17)}catch(e){}
try{doc.addImage('data:image/png;base64,'+LOGO2_B64,'PNG',w-mR-50,12,50,20)}catch(e){}
doc.setDrawColor(26,58,107);doc.setLineWidth(0.5);doc.line(mL,35,w-mR,35);
let y=50;
doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(26,58,107);
doc.text('CONSTANCIA DE ASISTENCIA',w/2,y,{align:'center'});y+=14;
doc.setFontSize(10);doc.setTextColor(40,40,40);doc.setFont('helvetica','bold');
doc.text('LA CORPORACION CENTRO DE INVESTIGACION EN PALMA DE ACEITE, CENIPALMA.',w/2,y,{align:'center'});y+=12;
doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(26,58,107);
doc.text('HACE CONSTAR',w/2,y,{align:'center'});y+=14;
doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor(40,40,40);
const txt='Que '+nom+', identificado(a) con Cedula de Ciudadania No '+ced.replace(/\B(?=(\d{3})+(?!\d))/g,'.')+', participo en el siguiente evento desarrollado en el marco del Plan Nacional de Extension.';
const bL=doc.splitTextToSize(txt,cW);doc.text(bL,mL,y,{lineHeightFactor:1.6});y+=bL.length*6.5+10;
const campos=[['Nombre del evento',val(ev.NombreEvento)],['Fecha',formatFecha(ev.FechaEvento)],['Duracion',dur],['Municipio',val(ev.MunicipioEvento)+', '+val(ev.DepartamentoEvento)],['Zona',val(ev.ZonaEvento)],['Modalidad',val(ev.Modalidad)],['Tematica',val(ev.Tematica)]];
const cL=42;const cV=cW-cL;
campos.forEach((c,i)=>{
const vL=doc.splitTextToSize(c[1],cV-6);const rH=Math.max(8,vL.length*5+4);
if(i%2===0){doc.setFillColor(240,244,250);doc.rect(mL,y-0.5,cW,rH,'F')}
doc.setDrawColor(200,210,230);doc.rect(mL,y-0.5,cL,rH);doc.rect(mL+cL,y-0.5,cV,rH);
doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(26,58,107);doc.text(c[0],mL+3,y+5);
doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(40,40,40);doc.text(vL,mL+cL+3,y+5);
y+=rH;
});
y+=14;doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor(40,40,40);
doc.text('Se expide a los '+fechaExp()+'.',mL,y);y+=14;
doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(100,100,100);
doc.text('Firmado digitalmente por',w/2,y,{align:'center'});y+=16;
try{doc.addImage('data:image/png;base64,'+FIRMA_IMG_B64,'PNG',w/2-30,y-5,60,9)}catch(e){}
y+=10;doc.setDrawColor(60,60,60);doc.line(w/2-50,y,w/2+50,y);y+=5;
doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(26,58,107);
doc.text(firm.nombre,w/2,y,{align:'center'});y+=5;
doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
doc.text(firm.cargo,w/2,y,{align:'center'});
doc.setDrawColor(26,58,107);doc.setLineWidth(0.5);doc.line(mL,ht-18,w-mR,ht-18);
doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(140,140,160);
doc.text('Documento generado por SMEAT - Cenipalma | '+new Date().toLocaleDateString('es-CO'),w/2,ht-13,{align:'center'});
doc.save('Constancia_'+val(ev.CodigoEvento)+'_'+ced+'.pdf');
}
