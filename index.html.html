<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constancias de Asistencia - SMEAT Cenipalma</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 860px; margin: 0 auto; }

  /* HEADER */
  .header { background: #1a3a6b; border-radius: 12px; padding: 20px 28px; margin-bottom: 24px; display: flex; align-items: center; gap: 20px; }
  .header img { height: 56px; }
  .header-text h1 { color: #fff; font-size: 18px; font-weight: 700; }
  .header-text p { color: #b0c4e8; font-size: 13px; margin-top: 3px; }

  /* SEARCH CARD */
  .search-card { background: #fff; border-radius: 12px; border: 1px solid #dce3ef; padding: 24px 28px; margin-bottom: 20px; }
  .search-card h2 { font-size: 15px; color: #1a3a6b; font-weight: 700; margin-bottom: 8px; }
  .search-card p { font-size: 13px; color: #666; margin-bottom: 16px; }
  .search-row { display: flex; gap: 10px; }
  .search-row input { flex: 1; border: 1.5px solid #c5d0e0; border-radius: 8px; padding: 11px 16px; font-size: 14px; color: #222; outline: none; }
  .search-row input:focus { border-color: #1a3a6b; }
  .btn-primary { background: #1a3a6b; color: #fff; border: none; border-radius: 8px; padding: 11px 24px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: #22499e; }
  .btn-orange { background: #e85d04; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; }
  .btn-orange:hover { background: #f06820; }
  .btn-outline { background: transparent; color: #1a3a6b; border: 1.5px solid #1a3a6b; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-outline:hover { background: #eef2fa; }

  /* STATES */
  .estado { text-align: center; padding: 32px; color: #888; font-size: 14px; }
  .estado-error { color: #c0392b; }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: #1a3a6b; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULTS */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: gap; }
  .results-count { font-size: 13px; color: #1a3a6b; font-weight: 600; background: #e8eef8; padding: 6px 14px; border-radius: 20px; }
  .select-all-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #444; cursor: pointer; }

  /* EVENT CARDS */
  .events-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .event-card { background: #fff; border: 1.5px solid #dce3ef; border-radius: 10px; padding: 16px 20px; cursor: pointer; transition: border-color 0.15s; display: flex; gap: 14px; align-items: flex-start; }
  .event-card:hover { border-color: #1a3a6b; }
  .event-card.selected { border-color: #e85d04; background: #fff8f5; }
  .event-check { width: 20px; height: 20px; border: 2px solid #bbb; border-radius: 5px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .event-card.selected .event-check { background: #e85d04; border-color: #e85d04; }
  .check-icon { color: #fff; font-size: 13px; font-weight: 700; display: none; }
  .event-card.selected .check-icon { display: block; }
  .event-info { flex: 1; }
  .event-name { font-size: 14px; font-weight: 700; color: #1a3a6b; margin-bottom: 6px; line-height: 1.4; }
  .event-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .meta-pill { font-size: 11px; color: #555; background: #f1f4fb; padding: 3px 10px; border-radius: 20px; }
  .meta-pill.naranja { background: #fff0e8; color: #c04a00; }

  /* ACTIONS BAR */
  .actions-bar { background: #fff; border: 1px solid #dce3ef; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .selected-count { font-size: 13px; color: #444; }
  .selected-count span { font-weight: 700; color: #e85d04; }
  .actions-btns { display: flex; gap: 10px; }

  /* PREVIEW */
  .preview-section { background: #fff; border-radius: 12px; border: 1px solid #dce3ef; overflow: hidden; margin-bottom: 20px; }
  .preview-toggle { background: #f5f8ff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid #dce3ef; }
  .preview-toggle h3 { font-size: 14px; color: #1a3a6b; font-weight: 700; }
  .preview-body { padding: 20px 24px; display: none; }
  .preview-body.open { display: block; }

  /* CONSTANCIA PREVIEW */
  .constancia { border: 1px solid #dce3ef; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .const-header { background: #1a3a6b; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .const-header-left { color: #fff; }
  .const-header-left .titulo { font-size: 13px; font-weight: 700; }
  .const-header-left .subtitulo { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .const-header-right { text-align: right; color: #b0c4e8; font-size: 11px; }
  .const-header-right .codigo { color: #fff; font-weight: 700; font-size: 12px; }
  .const-body-preview { padding: 16px 20px; }
  .cert-text { font-size: 12px; color: #555; text-align: center; line-height: 1.7; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed #ddd; }
  .cert-text .nombre { font-size: 15px; font-weight: 700; color: #1a3a6b; display: block; }
  .cert-text .cedula { font-weight: 700; color: #333; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { background: #f5f8ff; border-radius: 6px; padding: 8px 12px; }
  .field.full { grid-column: 1/-1; }
  .field-label { font-size: 10px; color: #888; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
  .field-value { font-size: 12px; color: #1a1a1a; font-weight: 600; }
  .firmas { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 16px; padding-top: 14px; border-top: 1px solid #eee; }
  .firma-box { text-align: center; }
  .firma-line { border-top: 1px solid #333; margin-bottom: 5px; margin-top: 28px; }
  .firma-name { font-size: 11px; font-weight: 700; color: #1a3a6b; }
  .firma-cargo { font-size: 10px; color: #666; }

  /* TABLE PREVIEW */
  .table-preview { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  .table-preview th { background: #1a3a6b; color: #fff; padding: 8px 10px; text-align: left; font-size: 11px; }
  .table-preview td { padding: 7px 10px; border-bottom: 1px solid #eee; color: #333; }
  .table-preview tr:nth-child(even) td { background: #f5f8ff; }

  @media(max-width:600px) {
    .grid2, .firmas { grid-template-columns: 1fr; }
    .search-row { flex-direction: column; }
    .actions-btns { flex-direction: column; }
  }
</style>
</head>

let datosActuales = [];
let seleccionados = new Set();

function formatFecha(ts) {
  if (!ts) return 'N/A';
  const d = new Date(ts);
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
}

function formatHora(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function val(v) { return v || 'N/A'; }

async function buscar() {
  const cedula = document.getElementById('inputCedula').value.trim();
  if (!cedula) {
    mostrarError('Por favor ingresa tu número de cédula.');
    return;
  }
  const div = document.getElementById('resultado');
  div.innerHTML = '<div class="estado"><div class="spinner"></div><br>Consultando tus eventos...</div>';
  seleccionados.clear();
  datosActuales = [];

  try {
    const where = encodeURIComponent("NumeroIdentificacion='" + cedula + "'");
    const fields = 'OBJECTID,NumeroIdentificacion,NombreAsistente,ApellidoAsistente,RNP,TipoParticipante,NombreEvento,CodigoEvento,FechaEvento,HoraInicio,HoraFinal,MunicipioEvento,DepartamentoEvento,ZonaEvento,DireccionEvento,Tematica,Organizador,CargoOrganizador,NombreJefe,CargoJefe,Modalidad';
    const url = FEATURE_URL + '/query?where=' + where + '&outFields=' + fields + '&f=json';
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.error) throw new Error(data.error.message);

    const features = data.features || [];
    if (features.length === 0) {
      div.innerHTML = '<div class="estado estado-error">No se encontraron eventos con asistencia confirmada para la cédula <strong>' + cedula + '</strong>.<br><br>Verifica que el número sea correcto.</div>';
      return;
    }

    datosActuales = features.map(f => f.attributes);
    renderResultados(cedula);
  } catch(e) {
    div.innerHTML = '<div class="estado estado-error">Error al consultar: ' + e.message + '</div>';
  }
}

function mostrarError(msg) {
  document.getElementById('resultado').innerHTML = '<div class="estado estado-error">' + msg + '</div>';
}

function toggleSeleccion(idx) {
  if (seleccionados.has(idx)) seleccionados.delete(idx);
  else seleccionados.add(idx);
  renderResultados(datosActuales[0].NumeroIdentificacion);
}

function seleccionarTodos() {
  if (seleccionados.size === datosActuales.length) seleccionados.clear();
  else datosActuales.forEach((_, i) => seleccionados.add(i));
  renderResultados(datosActuales[0].NumeroIdentificacion);
}

function renderResultados(cedula) {
  const d = datosActuales;
  const nombreCompleto = val(d[0].NombreAsistente) + ' ' + val(d[0].ApellidoAsistente);
  const todosSel = seleccionados.size === d.length;

  let html = '<div class="results-header">';
  html += '<span class="results-count">Se encontraron ' + d.length + ' evento(s) para: <strong>' + nombreCompleto + '</strong></span>';
  html += '</div>';

  html += '<div class="events-list">';
  d.forEach((ev, i) => {
    const sel = seleccionados.has(i);
    html += '<div class="event-card' + (sel?' selected':'') + '" onclick="toggleSeleccion(' + i + ')">';
    html += '<div class="event-check"><span class="check-icon">&#10003;</span></div>';
    html += '<div class="event-info">';
    html += '<div class="event-name">' + val(ev.NombreEvento) + '</div>';
    html += '<div class="event-meta">';
    html += '<span class="meta-pill">&#128197; ' + formatFecha(ev.FechaEvento) + '</span>';
    if (ev.MunicipioEvento) html += '<span class="meta-pill">&#128205; ' + ev.MunicipioEvento + ', ' + val(ev.DepartamentoEvento) + '</span>';
    if (ev.ZonaEvento) html += '<span class="meta-pill">Zona: ' + ev.ZonaEvento + '</span>';
    if (ev.Modalidad) html += '<span class="meta-pill naranja">' + ev.Modalidad + '</span>';
    if (ev.CodigoEvento) html += '<span class="meta-pill">Cód: ' + ev.CodigoEvento + '</span>';
    html += '</div></div></div>';
  });
  html += '</div>';

  html += '<div class="actions-bar">';
  html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
  html += '<label class="select-all-row" onclick="seleccionarTodos()" style="cursor:pointer;font-size:13px;color:#444;display:flex;align-items:center;gap:6px;">';
  html += '<input type="checkbox" ' + (todosSel?'checked':'') + ' onchange="seleccionarTodos()" style="width:16px;height:16px;cursor:pointer;">';
  html += (todosSel ? 'Deseleccionar todos' : 'Seleccionar todos') + '</label>';
  html += '<span class="selected-count">Seleccionados: <span>' + seleccionados.size + '</span></span>';
  html += '</div>';
  html += '<div class="actions-btns">';
  if (seleccionados.size === 1) {
    html += '<button class="btn-outline" onclick="previewConstancia()">Vista previa</button>';
    html += '<button class="btn-orange" onclick="descargarSeleccion()">&#8595; Descargar constancia</button>';
  } else if (seleccionados.size > 1) {
    html += '<button class="btn-outline" onclick="previewTabla()">Vista previa</button>';
    html += '<button class="btn-orange" onclick="descargarSeleccion()">&#8595; Descargar ' + seleccionados.size + ' constancias</button>';
  } else {
    html += '<button class="btn-orange" disabled style="opacity:0.4;cursor:not-allowed;">Selecciona un evento</button>';
  }
  html += '</div></div>';

  html += '<div id="previewContainer"></div>';
  document.getElementById('resultado').innerHTML = html;
}

  html += '<div class="field"><div class="field-label">Municipio</div><div class="field-value">' + val(ev.MunicipioEvento) + '</div></div>';
  html += '<div class="field"><div class="field-label">Departamento</div><div class="field-value">' + val(ev.DepartamentoEvento) + '</div></div>';

function previewTabla() {
  const indices = Array.from(seleccionados).sort((a,b)=>a-b);
  const ev0 = datosActuales[indices[0]];
  const nombreCompleto = val(ev0.NombreAsistente) + ' ' + val(ev0.ApellidoAsistente);

  let html = '<div class="preview-section"><div class="preview-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">';
  html += '<h3>Vista previa &mdash; Resumen de eventos seleccionados</h3><span style="font-size:12px;color:#888;">Clic para expandir</span></div>';
  html += '<div class="preview-body open">';
  html += '<p style="font-size:13px;color:#444;margin-bottom:12px;">Participante: <strong>' + nombreCompleto + '</strong> &mdash; C&eacute;dula: <strong>' + val(ev0.NumeroIdentificacion) + '</strong></p>';
  html += '<table class="table-preview"><thead><tr>';
  html += '<th>#</th><th>Evento</th><th>Fecha</th><th>Municipio</th><th>Zona</th><th>Modalidad</th>';
  html += '</tr></thead><tbody>';
  indices.forEach((idx, n) => {
    const ev = datosActuales[idx];
    html += '<tr><td>' + (n+1) + '</td>';
    html += '<td>' + val(ev.NombreEvento) + '</td>';
    html += '<td style="white-space:nowrap">' + formatFecha(ev.FechaEvento) + '</td>';
    html += '<td>' + val(ev.MunicipioEvento) + '</td>';
    html += '<td>' + val(ev.ZonaEvento) + '</td>';
    html += '<td>' + val(ev.Modalidad) + '</td></tr>';
  });
  html += '</tbody></table></div></div>';
  document.getElementById('previewContainer').innerHTML = html;
}

function descargarSeleccion() {
  const indices = Array.from(seleccionados).sort((a,b)=>a-b);
  if (indices.length === 1) {
    generarPDFUnico(datosActuales[indices[0]]);
  } else {
    generarPDFTabla(indices.map(i => datosActuales[i]));
  }
}

function generarPDFUnico(ev) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter' });
  const w = doc.internal.pageSize.getWidth();
  const nombreCompleto = val(ev.NombreAsistente) + ' ' + val(ev.ApellidoAsistente);
  const cedula = val(ev.NumeroIdentificacion);

  // Header azul
  doc.setFillColor(26, 58, 107);
  doc.rect(0, 0, w, 40, 'F');

  // Logo
  try { doc.addImage('data:image/png;base64,' + LOGO_B64, 'PNG', 12, 6, 55, 18); } catch(e){}

  // Titulo header
  doc.setTextColor(255,255,255);
  doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('CONSTANCIA DE ASISTENCIA', w/2, 18, {align:'center'});
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Cenipalma - Centro de Investigacion en Palma de Aceite', w/2, 25, {align:'center'});
  if (ev.CodigoEvento) {
    doc.setFontSize(8);
    doc.text('Codigo: ' + ev.CodigoEvento, w - 14, 22, {align:'right'});
  }

  // Linea naranja
  doc.setFillColor(232, 93, 4);
  doc.rect(0, 40, w, 3, 'F');

  let y = 55;

  // Texto certificacion
  doc.setTextColor(80,80,80); doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Cenipalma certifica que:', w/2, y, {align:'center'}); y += 8;

  doc.setTextColor(26,58,107); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text(nombreCompleto.toUpperCase(), w/2, y, {align:'center'}); y += 7;

  doc.setTextColor(60,60,60); doc.setFontSize(10); doc.setFont('helvetica','normal');
  let lineaCedula = 'identificado(a) con cedula ' + cedula.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  if (ev.RNP && ev.RNP !== 'null' && ev.RNP !== 'N/A') lineaCedula += '  |  RNP: ' + ev.RNP;
  doc.text(lineaCedula, w/2, y, {align:'center'}); y += 6;
  doc.text('participo y asistio al siguiente evento de extension:', w/2, y, {align:'center'}); y += 10;

  // Linea separador
  doc.setDrawColor(200,210,230); doc.line(14, y, w-14, y); y += 8;

  // Datos del evento en recuadros 2 col
  const col1 = 14, col2 = w/2 + 4, colW = w/2 - 18;

  function campoBox(label, valor, x, cy, ww) {
    doc.setFillColor(245,248,255);
    doc.roundedRect(x, cy, ww, 14, 2, 2, 'F');
    doc.setTextColor(130,130,150); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text(label.toUpperCase(), x+4, cy+5);
    doc.setTextColor(30,30,30); doc.setFontSize(9); doc.setFont('helvetica','bold');
    const v = String(valor||'N/A');
    doc.text(doc.splitTextToSize(v, ww-8)[0], x+4, cy+11);
    return cy + 16;
  }

  // Fila evento nombre full width
  doc.setFillColor(245,248,255);
  doc.roundedRect(14, y, w-28, 18, 2, 2, 'F');
  doc.setTextColor(130,130,150); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('NOMBRE DEL EVENTO', 18, y+6);
  doc.setTextColor(26,58,107); doc.setFontSize(10); doc.setFont('helvetica','bold');
  const nombreLines = doc.splitTextToSize(val(ev.NombreEvento), w-36);
  doc.text(nombreLines[0], 18, y+13);
  y += 22;

  // Dos columnas
  const yStart = y;
  let y1 = campoBox('Fecha', formatFecha(ev.FechaEvento), col1, y, colW);
  let y2 = campoBox('Modalidad', val(ev.Modalidad), col2, y, colW);
  y = Math.max(y1, y2);
  y1 = campoBox('Municipio', val(ev.MunicipioEvento), col1, y, colW);
  y2 = campoBox('Departamento', val(ev.DepartamentoEvento), col2, y, colW);
  y = Math.max(y1, y2);
  y1 = campoBox('Zona', val(ev.ZonaEvento), col1, y, colW);
  y2 = campoBox('Hora inicio - Hora final', (ev.HoraInicio ? formatHora(ev.HoraInicio) : '') + (ev.HoraFinal ? '  -  ' + formatHora(ev.HoraFinal) : ''), col2, y, colW);
  y = Math.max(y1, y2) + 2;

  // Direccion y tematica full
  doc.setFillColor(245,248,255);
  doc.roundedRect(14, y, w-28, 14, 2, 2, 'F');
  doc.setTextColor(130,130,150); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('DIRECCION', 18, y+5);
  doc.setTextColor(30,30,30); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text(doc.splitTextToSize(val(ev.DireccionEvento), w-36)[0], 18, y+11);
  y += 16;

  doc.setFillColor(245,248,255);
  doc.roundedRect(14, y, w-28, 14, 2, 2, 'F');
  doc.setTextColor(130,130,150); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('TEMATICA', 18, y+5);
  doc.setTextColor(30,30,30); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text(doc.splitTextToSize(val(ev.Tematica), w-36)[0], 18, y+11);
  y += 20;

  // Firmas
  doc.setDrawColor(180,180,180);
  doc.line(24, y+22, 24+(w/2-40), y+22);
  doc.line(w/2+16, y+22, w/2+16+(w/2-40), y+22);
  doc.setTextColor(26,58,107); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text(val(ev.Organizador), 24, y+27);
  doc.text(val(ev.NombreJefe), w/2+16, y+27);
  doc.setTextColor(100,100,100); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text(val(ev.CargoOrganizador), 24, y+32);
  doc.text(val(ev.CargoJefe) || 'Jefe inmediato', w/2+16, y+32);
  y += 40;

  // Footer
  doc.setFillColor(26,58,107);
  doc.rect(0, doc.internal.pageSize.getHeight()-14, w, 14, 'F');
  doc.setTextColor(180,200,230); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('Documento generado por SMEAT - Cenipalma  |  ' + new Date().toLocaleDateString('es-CO'), w/2, doc.internal.pageSize.getHeight()-5, {align:'center'});

  doc.save('Constancia_' + val(ev.CodigoEvento) + '_' + cedula + '.pdf');
}

function generarPDFTabla(eventos) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter' });
  const w = doc.internal.pageSize.getWidth();
  const ev0 = eventos[0];
  const nombreCompleto = val(ev0.NombreAsistente) + ' ' + val(ev0.ApellidoAsistente);
  const cedula = val(ev0.NumeroIdentificacion);

  // Header
  doc.setFillColor(26,58,107);
  doc.rect(0, 0, w, 40, 'F');
  try { doc.addImage('data:image/png;base64,' + LOGO_B64, 'PNG', 12, 6, 55, 18); } catch(e){}
  doc.setTextColor(255,255,255);
  doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('CONSTANCIAS DE ASISTENCIA', w/2, 18, {align:'center'});
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Cenipalma - Centro de Investigacion en Palma de Aceite', w/2, 25, {align:'center'});
  doc.setFillColor(232,93,4);
  doc.rect(0, 40, w, 3, 'F');

  let y = 52;
  doc.setTextColor(26,58,107); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(nombreCompleto.toUpperCase(), w/2, y, {align:'center'}); y += 7;
  doc.setTextColor(60,60,60); doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Cedula: ' + cedula + (ev0.RNP && ev0.RNP!=='null' ? '   |   RNP: ' + ev0.RNP : ''), w/2, y, {align:'center'}); y += 5;
  doc.text('Ha asistido a los siguientes ' + eventos.length + ' evento(s) de extension:', w/2, y, {align:'center'}); y += 8;

  // Tabla
  const headers = ['#','Evento','Fecha','Municipio','Zona','Modalidad'];
  const colWidths = [8, 80, 28, 26, 22, 22];
  const tableLeft = 12;

  // Header tabla
  let cx = tableLeft;
  doc.setFillColor(26,58,107);
  doc.rect(tableLeft, y, w-24, 8, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
  headers.forEach((h, i) => { doc.text(h, cx+2, y+5.5); cx += colWidths[i]; });
  y += 8;

  eventos.forEach((ev, n) => {
    if (y > 240) { doc.addPage(); y = 20; }
    cx = tableLeft;
    const bg = n % 2 === 0 ? [245,248,255] : [255,255,255];
    doc.setFillColor(...bg);
    doc.rect(tableLeft, y, w-24, 9, 'F');
    doc.setDrawColor(220,226,238);
    doc.rect(tableLeft, y, w-24, 9);
    doc.setTextColor(30,30,30); doc.setFontSize(8); doc.setFont('helvetica','normal');
    const cols = [
      String(n+1),
      doc.splitTextToSize(val(ev.NombreEvento), colWidths[1]-4)[0],
      formatFecha(ev.FechaEvento).replace(' de ',' ').substring(0,14),
      val(ev.MunicipioEvento).substring(0,14),
      val(ev.ZonaEvento).substring(0,12),
      val(ev.Modalidad).substring(0,12)
    ];
    cols.forEach((c, i) => { doc.text(String(c), cx+2, y+6); cx += colWidths[i]; });
    y += 9;
  });

  y += 20;
  // Footer
  doc.setFillColor(26,58,107);
  const ph = doc.internal.pageSize.getHeight();
  doc.rect(0, ph-14, w, 14, 'F');
  doc.setTextColor(180,200,230); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('Documento generado por SMEAT - Cenipalma  |  ' + new Date().toLocaleDateString('es-CO'), w/2, ph-5, {align:'center'});

  doc.save('Constancias_' + cedula + '_' + eventos.length + 'eventos.pdf');
}
